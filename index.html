document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ay: swap;\n  src: url(\"489d0610-6d5d-426d-b10c-20317d18741b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"3d933033-1ba1-477e-a4a7-a26412f6595c\"><\u002Fscript>\n<script src=\"165bdca3-5944-415c-abce-da6c4f93d778\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;background:#F3DEBE;font-family:'Fredoka',system-ui,sans-serif;color:#241812}\n  input{font-family:'Spline Sans Mono',monospace}\n  ::-webkit-scrollbar{height:10px;width:10px}\n  ::-webkit-scrollbar-thumb{background:#d8bd96;border-radius:6px}\n  @keyframes flick{0%,100%{transform:rotate(45deg) scaleY(1);opacity:.92}50%{transform:rotate(45deg) scaleY(1.15) translateY(-1px);opacity:1}}\n\n  /* ---------- Adaptable a tablet y móvil ---------- */\n  @media (max-width:960px){\n    [style*=\"repeat(4\"]{grid-template-columns:repeat(2,1fr)!important}\n    [style*=\"repeat(5\"]{grid-template-columns:repeat(2,1fr)!important}\n    [style*=\"repeat(3\"]{grid-template-columns:repeat(2,1fr)!important}\n    [style*=\"1.15fr 1fr\"],[style*=\"1.25fr 1fr\"],[style*=\"1.3fr 1fr\"],[style*=\"1fr 1.3fr\"]{grid-template-columns:1fr!important}\n  }\n  @media (max-width:820px){\n    [style*=\"310px\"]{grid-template-columns:1fr!important}\n    [style*=\"sticky\"][style*=\"60px\"]{height:auto!important;flex-wrap:wrap!important;padding-top:9px!important;padding-bottom:9px!important;row-gap:8px!important}\n  }\n  @media (max-width:680px){\n    [style*=\"repeat(2\"]{grid-template-columns:1fr!important}\n    [style*=\"repeat(3\"]{grid-template-columns:1fr!important}\n    [style*=\"repeat(4\"]{grid-template-columns:1fr 1fr!important}\n    [style*=\"1fr 1fr 1fr\"]{grid-template-columns:1fr!important}\n    [style*=\"1fr 1fr\"]{grid-template-columns:1fr!important}\n    [style*=\"26px 26px 60px\"]{padding:16px 14px 48px!important}\n    [style*=\"font-size: 24px\"]{font-size:20px!important}\n    [style*=\"font-size: 30px\"]{font-size:24px!important}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#F3DEBE\">\n\n  <!-- ==================== ACCESO ==================== -->\n  <sc-if value=\"{{ isAccess }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 24px;background:radial-gradient(120% 90% at 50% -10%,#FBEBD0,#F3DEBE 60%)\">\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:8px\">\n      <div style=\"width:56px;height:48px;position:relative\">\n        <div style=\"position:absolute;top:0;left:2px;right:2px;height:20px;background:linear-gradient(#F7C877,#EBA748);border-radius:26px 26px 7px 7px\"><\u002Fdiv>\n        <div style=\"position:absolute;top:7px;left:15px;width:7px;height:4px;background:#FFF6E4;border-radius:50%;transform:rotate(-20deg)\"><\u002Fdiv>\n        <div style=\"position:absolute;top:5px;left:25px;width:7px;height:4px;background:#FFF6E4;border-radius:50%\"><\u002Fdiv>\n        <div style=\"position:absolute;top:7px;left:35px;width:7px;height:4px;background:#FFF6E4;border-radius:50%;transform:rotate(20deg)\"><\u002Fdiv>\n        <div style=\"position:absolute;top:20px;left:0;right:0;height:6px;background:#8BC34A;border-radius:4px\"><\u002Fdiv>\n        <div style=\"position:absolute;top:25px;left:1px;right:1px;height:9px;background:#5A3620;border-radius:5px\"><\u002Fdiv>\n        <div style=\"position:absolute;top:34px;left:2px;right:2px;height:13px;background:linear-gradient(#EBA748,#D98B2E);border-radius:6px 6px 16px 16px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div><div style=\"font-size:30px;font-weight:700;line-height:1\">BK · Control<\u002Fdiv><div style=\"font-size:13px;color:#6b4a30;letter-spacing:1px\">TENERIFE · 8 RESTAURANTES<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:15px;color:#6b4a30;margin:6px 0 28px\">¿Quién entra? Cada restaurante ve <b>solo lo suyo<\u002Fb>.<\u002Fdiv>\n\n    <div onclick=\"{{ enterOffice }}\" style=\"width:min(680px,92vw);background:#241812;border-radius:18px;padding:22px 26px;display:flex;align-items:center;gap:18px;cursor:pointer;box-shadow:0 18px 44px -22px rgba(58,34,20,.7);margin-bottom:22px\" style-hover=\"transform:translateY(-2px)\">\n      <div style=\"width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#E4002B,#FF7A00);display:flex;align-items:center;justify-content:center;font-size:26px;flex:none\">👤<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"color:#fff;font-size:20px;font-weight:700\">Oficina · YO<\u002Fdiv><div style=\"color:#C9A87E;font-size:13px;margin-top:2px\">Veo el general de los 8, cargo el plan y reviso diario, mes y año<\u002Fdiv><\u002Fdiv>\n      <div style=\"color:#FFC72C;font-size:22px\">→<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"width:min(680px,92vw)\">\n      <div style=\"font-size:12px;font-weight:700;color:#9a7a5c;letter-spacing:1px;margin-bottom:11px\">O ENTRA COMO TU RESTAURANTE<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:11px\">\n        <sc-for list=\"{{ accessCards }}\" as=\"a\" hint-placeholder-count=\"8\">\n          <div onclick=\"{{ a.enter }}\" style=\"background:#FFFDF8;border:1px solid #EEDFC4;border-radius:13px;padding:15px 17px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 10px 26px -20px rgba(58,34,20,.5)\" style-hover=\"border-color:#FF7A00;transform:translateY(-2px)\">\n            <span style=\"width:11px;height:11px;border-radius:50%;background:{{ a.dot }};flex:none\"><\u002Fspan>\n            <span style=\"font-weight:600;font-size:15px;flex:1\">{{ a.name }}<\u002Fspan>\n            <span style=\"font-size:11px;font-weight:600;color:{{ a.stColor }};background:{{ a.stBg }};padding:3px 9px;border-radius:20px\">{{ a.stTxt }}<\u002Fspan>\n            <span onclick=\"{{ a.copy }}\" style=\"font-size:11px;font-weight:600;color:#5a3620;background:#F3E7D2;padding:4px 10px;border-radius:20px;white-space:nowrap\" style-hover=\"background:#FFC72C\">🔗 {{ a.copyTxt }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px;background:#FFFDF8;border:1px solid #EEDFC4;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px\">\n        <span style=\"font-size:18px\">🔗<\u002Fspan>\n        <div style=\"flex:1;font-size:12.5px;color:#6b4a30\">Reparte a cada encargado su enlace (<b>🔗 Copiar enlace<\u002Fb> en su tarjeta): abre <b>directo a su restaurante<\u002Fb>, sin ver a los demás. Tu vista de oficina tiene su propia URL.<\u002Fdiv>\n        <span onclick=\"{{ copyOffice }}\" style=\"cursor:pointer;font-size:12px;font-weight:700;color:#FFC72C;background:#241812;padding:8px 14px;border-radius:20px;white-space:nowrap\" style-hover=\"background:#3a2417\">👤 {{ copyOfficeTxt }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#9a7a5c;margin-top:12px;text-align:center\">Prototipo: los datos se guardan en este navegador y se sincronizan entre pestañas. <br>El candado real (que cada uno solo pueda ver lo suyo) lo pone el login de <b>Supabase<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ==================== ACCESO DENEGADO ==================== -->\n  <sc-if value=\"{{ isDenied }}\">\n  <div style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 24px;text-align:center\">\n    <div style=\"font-size:54px;margin-bottom:6px\">🔒<\u002Fdiv>\n    <div style=\"font-size:26px;font-weight:700;color:#241812\">Enlace no válido<\u002Fdiv>\n    <div style=\"font-size:14px;color:#6b4a30;margin-top:8px;max-width:420px\">Este enlace de acceso no es correcto o está incompleto. Pide a la oficina el enlace de tu restaurante.<\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ==================== OFICINA (YO) ==================== -->\n  <sc-if value=\"{{ isOffice }}\">\n  <div style=\"position:sticky;top:0;z-index:20;background:#241812;padding:0 26px;display:flex;align-items:center;gap:18px;height:60px;box-shadow:0 4px 18px -8px rgba(0,0,0,.5)\">\n    <div style=\"display:flex;align-items:center;gap:11px\"><div style=\"width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#E4002B,#FF7A00);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;font-weight:700\">{{ officeInitial }}<\u002Fdiv><div><div style=\"color:#fff;font-weight:700;font-size:16px;line-height:1\">{{ officeName }}<\u002Fdiv><div style=\"color:#C9A87E;font-size:10.5px;letter-spacing:1px\">{{ officeRegion }} · 8 RESTAURANTES<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:6px;margin-left:12px\">\n      <div onclick=\"{{ goHoy }}\" style=\"cursor:pointer;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;color:{{ tabHoyColor }};background:{{ tabHoyBg }}\">📅 Hoy<\u002Fdiv>\n      <div onclick=\"{{ goCons }}\" style=\"cursor:pointer;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;color:{{ tabConsColor }};background:{{ tabConsBg }}\">📊 Consolidado<\u002Fdiv>\n      <div onclick=\"{{ goPlan }}\" style=\"cursor:pointer;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;color:{{ tabPlanColor }};background:{{ tabPlanBg }}\">📥 Plan &amp; datos<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-left:auto;display:flex;align-items:center;gap:12px\">\n      <div onclick=\"{{ goComments }}\" style=\"cursor:pointer;position:relative;display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:{{ tabComColor }};background:{{ tabComBg }};border-radius:9px;padding:8px 13px\">🔔 Avisos\n        <sc-if value=\"{{ hasNotif }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"min-width:18px;height:18px;padding:0 5px;border-radius:10px;background:#E4002B;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center\">{{ notifCount }}<\u002Fspan><\u002Fsc-if>\n      <\u002Fdiv>\n      <span style=\"color:#C9A87E;font-size:12.5px;font-family:'Spline Sans Mono',monospace\">{{ hoyLong }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- office · COMENTARIOS -->\n  <sc-if value=\"{{ officeComents }}\">\n  <div style=\"padding:26px 26px 60px\">\n    <div style=\"font-size:24px;font-weight:700;margin-bottom:3px\">Avisos de quebrantos · <span style=\"color:#E4002B\">explicaciones<\u002Fspan><\u002Fdiv>\n    <div style=\"font-size:13.5px;color:#6b4a30;margin-bottom:18px\">Descuadres de efectivo superiores a ±10 € que los restaurantes han justificado.<\u002Fdiv>\n    <sc-if value=\"{{ commentsEmpty }}\"><div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:14px;padding:30px;text-align:center;color:#9a7a5c\">Sin avisos pendientes. Todo cuadra 👍<\u002Fdiv><\u002Fsc-if>\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <sc-for list=\"{{ comments }}\" as=\"c\" hint-placeholder-count=\"2\">\n        <div onclick=\"{{ c.open }}\" style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:16px;cursor:pointer\" style-hover=\"border-color:#FF7A00\">\n          <span style=\"width:11px;height:11px;border-radius:50%;background:{{ c.dot }};flex:none\"><\u002Fspan>\n          <div style=\"width:150px;flex:none\"><div style=\"font-weight:700;font-size:14.5px\">{{ c.name }}<\u002Fdiv><div style=\"font-size:11.5px;color:#9a7a5c\">{{ c.f }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:110px;flex:none;text-align:center\"><div style=\"font-size:18px;font-weight:700;color:{{ c.xColor }};font-family:'Spline Sans Mono',monospace\">{{ c.xTxt }}<\u002Fdiv><div style=\"font-size:10.5px;color:#9a7a5c\">{{ c.kind }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font-size:13px;color:#241812\">{{ c.motivoTxt }}<\u002Fdiv><div style=\"font-size:11.5px;color:#9a7a5c;margin-top:2px\">— {{ c.personaTxt }}<\u002Fdiv><\u002Fdiv>\n          <span style=\"color:#C9A87E;font-size:18px\">→<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- office · HOY -->\n  <sc-if value=\"{{ officeHoy }}\">\n  <div style=\"padding:26px 26px 60px\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px\">\n      <div><div style=\"font-size:24px;font-weight:700\">Registro de hoy · <span style=\"color:#E4002B\">los 8<\u002Fspan><\u002Fdiv><div style=\"font-size:13.5px;color:#6b4a30;margin-top:3px\">Lo que han enviado los encargados este turno. Pulsa una fila para ver su ficha.<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;background:#241812;border-radius:30px;padding:4px\">\n        <div onclick=\"{{ setMedio }}\" style=\"cursor:pointer;font-size:13px;font-weight:600;color:{{ turnoMedioColor }};background:{{ turnoMedioBg }};padding:7px 16px;border-radius:24px\">☀️ Mediodía<\u002Fdiv>\n        <div onclick=\"{{ setNoche }}\" style=\"cursor:pointer;font-size:13px;font-weight:600;color:{{ turnoNocheColor }};background:{{ turnoNocheBg }};padding:7px 16px;border-radius:24px\">🌙 Noche<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px\">\n      <div style=\"background:#241812;border-radius:14px;padding:15px 18px;color:#fff\"><div style=\"font-size:11.5px;color:#C9A87E;font-weight:600\">ENVIADOS ESTE TURNO<\u002Fdiv><div style=\"font-size:26px;font-weight:700;color:#FFC72C;font-family:'Spline Sans Mono',monospace;margin-top:5px\">{{ sumEnviados }}<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:14px;padding:15px 18px\"><div style=\"font-size:11.5px;color:#9a7a5c;font-weight:600\">VENTA DEL DÍA<\u002Fdiv><div style=\"font-size:26px;font-weight:700;font-family:'Spline Sans Mono',monospace;margin-top:5px\">{{ sumVenta }} €<\u002Fdiv><div style=\"font-size:11px;color:#9a7a5c\">plan {{ sumPlan }} €<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:14px;padding:15px 18px\"><div style=\"font-size:11.5px;color:#9a7a5c;font-weight:600\">CUMPLIMIENTO<\u002Fdiv><div style=\"font-size:26px;font-weight:700;font-family:'Spline Sans Mono',monospace;margin-top:5px;color:{{ sumPctColor }}\">{{ sumPct }}<\u002Fdiv><div style=\"font-size:11px;color:{{ sumDifColor }}\">{{ sumDif }} vs plan<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:14px;padding:15px 18px\"><div style=\"font-size:11.5px;color:#9a7a5c;font-weight:600\">⏱️ TIEMPOS FUERA<\u002Fdiv><div style=\"font-size:26px;font-weight:700;font-family:'Spline Sans Mono',monospace;margin-top:5px;color:{{ sumTiemposColor }}\">{{ sumTiempos }}<\u002Fdiv><div style=\"font-size:11px;color:#9a7a5c\">{{ sumTiemposSub }}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ hayPendientes }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"background:#FFF3DF;border:1.5px solid #FFC72C;border-radius:13px;padding:13px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px\">\n      <span style=\"font-size:20px\">⏳<\u002Fspan><span style=\"font-size:13.5px;color:#5a3620\"><b>{{ pendCount }}<\u002Fb> sin rellenar este turno: {{ pendientesTxt }}. Se ignoran en las medias hasta que los completen.<\u002Fspan>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"background:#FFFDF8;border-radius:18px;box-shadow:0 22px 50px -30px rgba(58,34,20,.55);overflow:hidden\">\n      <div style=\"overflow-x:auto\">\n      <sc-for list=\"{{ officeRows }}\" as=\"o\" hint-placeholder-count=\"8\">\n            <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;min-width:1080px;font-size:13px\">\n        <thead><tr style=\"background:linear-gradient(#3a2417,#241812);color:#F7DFBF\">\n          <th style=\"text-align:left;padding:13px 16px;font-size:11px;font-weight:600;position:sticky;left:0;background:#2c1d12\">RESTAURANTE<\u002Fth>\n          <th style=\"padding:13px 8px;font-size:11px;font-weight:600;color:#C9A87E\">PLAN €<\u002Fth>\n          <th style=\"padding:13px 8px;font-size:11px;font-weight:600\">REAL €<\u002Fth>\n          <th style=\"padding:13px 8px;font-size:11px;font-weight:600;color:#C9A87E\">DIF<\u002Fth>\n          <th style=\"padding:13px 8px;font-size:11px;font-weight:600\">🚗 AUTO<\u002Fth>\n          <th style=\"padding:13px 8px;font-size:11px;font-weight:600\">🍔 ORB<\u002Fth>\n          <th style=\"padding:13px 8px;font-size:11px;font-weight:600;color:#FFC72C\">RATIO<\u002Fth>\n          <th style=\"padding:13px 8px;font-size:11px;font-weight:600;color:#FFC72C\">Δ PTS<\u002Fth>\n          <th style=\"padding:13px 8px;font-size:11px;font-weight:600\">★<\u002Fth>\n          <th style=\"padding:13px 14px;font-size:11px;font-weight:600\">ESTADO<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr onclick=\"{{ o.open }}\" style=\"border-bottom:1px solid #F0E4CE;cursor:pointer;background:{{ o.rowBg }}\" style-hover=\"background:#FFF9EE\">\n              <td style=\"padding:11px 16px;position:sticky;left:0;background:{{ o.rowBg }}\"><div style=\"display:flex;align-items:center;gap:9px\"><span style=\"width:9px;height:9px;border-radius:50%;background:{{ o.dot }}\"><\u002Fspan><span style=\"font-weight:600;white-space:nowrap\">{{ o.name }}<\u002Fspan><\u002Fdiv><\u002Ftd>\n              <td style=\"padding:11px 8px;text-align:right;color:#9a7a5c;font-family:'Spline Sans Mono',monospace\">{{ o.planTxt }}<\u002Ftd>\n              <td style=\"padding:11px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:700;color:{{ o.realColor }}\">{{ o.realTxt }}<\u002Ftd>\n              <td style=\"padding:11px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:600;color:{{ o.difColor }}\">{{ o.difTxt }}<\u002Ftd>\n              <td style=\"padding:11px 8px;text-align:center;font-family:'Spline Sans Mono',monospace;font-weight:600;color:{{ o.autoColor }}\">{{ o.autoTxt }}<\u002Ftd>\n              <td style=\"padding:11px 8px;text-align:center;font-family:'Spline Sans Mono',monospace;font-weight:600;color:{{ o.orbColor }}\">{{ o.orbTxt }}<\u002Ftd>\n              <td style=\"padding:11px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:700\">{{ o.ratioTxt }}<\u002Ftd>\n              <td style=\"padding:11px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:700;color:{{ o.ptsColor }}\">{{ o.ptsTxt }}<\u002Ftd>\n              <td style=\"padding:11px 8px;text-align:center;color:#FFB300;font-size:12px\">{{ o.resTxt }}<\u002Ftd>\n              <td style=\"padding:11px 14px\"><span style=\"font-size:11px;font-weight:700;color:{{ o.stColor }};background:{{ o.stBg }};padding:4px 10px;border-radius:20px;white-space:nowrap\">{{ o.stTxt }}<\u002Fspan><\u002Ftd>\n            <\u002Ftr>\n          \n        <\u002Ftbody>\n        <tfoot><tr style=\"background:#FBEBD0;font-weight:700\">\n          <td style=\"padding:13px 16px;position:sticky;left:0;background:#FBEBD0\">Total / Media <span style=\"font-weight:500;color:#9a7a5c;font-size:11px\">({{ enviadoCount }} enviados)<\u002Fspan><\u002Ftd>\n          <td style=\"padding:13px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;color:#6b4a30\">{{ hoyPlan }}<\u002Ftd>\n          <td style=\"padding:13px 8px;text-align:right;font-family:'Spline Sans Mono',monospace\">{{ hoyReal }}<\u002Ftd>\n          <td style=\"padding:13px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;color:{{ hoyDifColor }}\">{{ hoyDif }}<\u002Ftd>\n          <td colspan=\"2\"><\u002Ftd>\n          <td style=\"padding:13px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;color:#E4002B\">{{ hoyRatio }}<\u002Ftd>\n          <td style=\"padding:13px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;color:{{ hoyPtsColor }}\">{{ hoyPts }}<\u002Ftd>\n          <td colspan=\"2\"><\u002Ftd>\n        <\u002Ftr><\u002Ftfoot>\n      <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- office · CONSOLIDADO -->\n  <sc-if value=\"{{ officeCons }}\">\n  <div style=\"padding:26px 26px 60px\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px\">\n      <div><div style=\"font-size:24px;font-weight:700\">Consolidado · <span style=\"color:#E4002B\">{{ periodoTxt }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13.5px;color:#6b4a30;margin-top:3px\">Todos los restaurantes juntos · {{ consMetricTxt }}.<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n        <div style=\"display:flex;background:#241812;border-radius:30px;padding:4px\">\n          <div onclick=\"{{ setMetricReal }}\" style=\"cursor:pointer;font-size:13px;font-weight:600;color:{{ metricRealColor }};background:{{ metricRealBg }};padding:7px 16px;border-radius:24px\">vs Plan<\u002Fdiv>\n          <div onclick=\"{{ setMetricProy }}\" style=\"cursor:pointer;font-size:13px;font-weight:600;color:{{ metricProyColor }};background:{{ metricProyBg }};padding:7px 16px;border-radius:24px\">vs Proyección<\u002Fdiv>\n        <\u002Fdiv>\n        <select value=\"{{ periodoVal }}\" onchange=\"{{ onPeriodo }}\" style=\"font-family:'Fredoka';font-size:13px;font-weight:600;color:#241812;background:#fff;border:2px solid #E7CFA8;border-radius:24px;padding:8px 14px;outline:none;cursor:pointer\" style-focus=\"border-color:#FF7A00\">\n          <sc-for list=\"{{ periodOptions }}\" as=\"o\" hint-placeholder-count=\"13\"><option value=\"{{ o.v }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px\">\n      <div style=\"background:#241812;border-radius:14px;padding:16px 18px;color:#fff\"><div style=\"font-size:11.5px;color:#C9A87E;font-weight:600\">VENTA REAL<\u002Fdiv><div style=\"font-size:25px;font-weight:700;color:#FFC72C;font-family:'Spline Sans Mono',monospace;margin-top:6px\">{{ consVenta }} €<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:14px;padding:16px 18px\"><div style=\"font-size:11.5px;color:#9a7a5c;font-weight:600\">{{ consTargetLabel }}<\u002Fdiv><div style=\"font-size:25px;font-weight:700;font-family:'Spline Sans Mono',monospace;margin-top:6px\">{{ consPlan }} €<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:14px;padding:16px 18px\"><div style=\"font-size:11.5px;color:#9a7a5c;font-weight:600\">DESVIACIÓN<\u002Fdiv><div style=\"font-size:25px;font-weight:700;color:{{ consDesvColor }};font-family:'Spline Sans Mono',monospace;margin-top:6px\">{{ consDesv }}<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:linear-gradient(135deg,#E4002B,#FF7A00);border-radius:14px;padding:16px 18px;color:#fff\"><div style=\"font-size:11.5px;color:#FFE0C4;font-weight:600\">RATIO MEDIO €/h<\u002Fdiv><div style=\"font-size:25px;font-weight:700;font-family:'Spline Sans Mono',monospace;margin-top:6px\">{{ consRatio }}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1.3fr;gap:18px\">\n      <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:16px;padding:18px 20px\">\n        <div style=\"font-weight:700;font-size:15px;margin-bottom:4px\">🏁 Ranking · {{ consMetricTxt }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;padding:0 8px 8px;font-size:10.5px;color:#9a7a5c;font-weight:600;letter-spacing:.3px\"><span style=\"width:20px\"><\u002Fspan><span style=\"width:9px\"> tyle=\"height:5px;background:{{ c.dot }}\"><\u002Fdiv>\n              <div style=\"padding:13px 15px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:7px\"><span style=\"font-weight:700;font-size:13.5px\">{{ c.name }}<\u002Fspan><span style=\"font-size:10.5px;font-weight:700;color:{{ c.pctColor }};background:{{ c.pctBg }};border-radius:20px;padding:2px 8px\">{{ c.pctTxt }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:20px;font-weight:700;font-family:'Spline Sans Mono',monospace\">{{ c.ventaTxt }} €<\u002Fdiv>\n                <div style=\"font-size:11px;color:#9a7a5c\">plan {{ c.planTxt }} · ratio {{ c.ratioTxt }}<\u002Fdiv>\n                <div style=\"height:6px;background:#EFE2CC;border-radius:4px;overflow:hidden;margin-top:9px\"><div style=\"width:{{ c.pct }}%;height:100%;background:{{ c.barColor }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- office · PLAN & DATOS -->\n  <sc-if value=\"{{ officePlan }}\">\n  <div style=\"padding:26px 26px 60px;max-width:1080px\">\n    <div style=\"font-size:24px;font-weight:700;margin-bottom:3px\">Plan de ventas &amp; datos<\u002Fdiv>\n    <div style=\"font-size:13.5px;color:#6b4a30;margin-bottom:20px\">Sube el Excel del plan y se vuelca por día en cada restaurante. Aquí también conectas tu base de datos Supabase.<\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:18px;margin-bottom:18px\">\n      <!-- upload -->\n      <div style=\"background:#FFFDF8;border:1.5px solid #EAD9BB;border-radius:16px;padding:20px 22px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\"><span style=\"font-size:22px\">📥<\u002Fspan><div style=\"font-weight:700;font-size:16px\">Carga masiva del plan (Excel)<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#6b4a30;margin-bottom:14px\">Lee tu Excel de <b>Plan Ventas TENERIFE<\u002Fb> tal cual: empareja por <b>código BK<\u002Fb>, entiende importes <b>2.978&nbsp;€<\u002Fb> y fechas del mes. Coge solo tus 8 restaurantes.<\u002Fdiv>\n        <label style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:2px dashed #D8BD96;border-radius:13px;padding:26px;cursor:pointer;background:#FFF9EE\" style-hover=\"border-color:#FF7A00;background:#FFF3DF\">\n          <span style=\"font-size:30px\">📄<\u002Fspan>\n          <span style=\"font-size:13.5px;font-weight:600;color:#5a3620\">Arrastra o pulsa para elegir tu .xlsx / .csv<\u002Fspan>\n          <input type=\"file\" accept=\".xlsx,.xls,.csv\" onchange=\"{{ onPlanFile }}\" style=\"display:none\">\n        <\u002Flabel>\n        <div style=\"display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap\">\n          <button onclick=\"{{ downloadTemplate }}\" style=\"background:#241812;color:#FFC72C;border:none;border-radius:10px;padding:10px 16px;font-family:'Fredoka';font-size:13.5px;font-weight:600;cursor:pointer\">⬇ Descargar plantilla<\u002Fbutton>\n          <sc-if value=\"{{ planInfo }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:12.5px;font-weight:600;color:{{ planInfoColor }}\">{{ planInfo }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasPreview }}\">\n        <div style=\"margin-top:16px;border-top:1px solid #F0E4CE;padding-top:14px\">\n          <div style=\"font-size:12.5px;font-weight:700;color:#E4002B;margin-bottom:10px\">VISTA PREVIA · {{ previewSubtitle }}<\u002Fdiv>\n          <div style=\"max-height:230px;overflow:auto;border:1px solid #F0E4CE;border-radius:10px\">\n            <sc-for list=\"{{ previewRows }}\" as=\"p\" hint-placeholder-count=\"8\">\n                  <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:12.5px\">\n              <thead><tr style=\"background:#FBEBD0\"><th style=\"text-align:left;padding:8px 12px;font-weight:600\">Restaurante<\u002Fth><th style=\"text-align:right;padding:8px 12px;font-weight:600\">{{ previewCol }}<\u002Fth><th style=\"text-align:center;padding:8px 12px;font-weight:600\">Emparejado<\u002Fth><\u002Ftr><\u002Fthead>\n              <tbody>\n                <tr style=\"border-top:1px solid #F6EEDD\"><td style=\"padding:7px 12px;font-weight:600\">{{ p.name }}<\u002Ftd><td style=\"padding:7px 12px;text-align:right;font-family:'Spline Sans Mono',monospace\">{{ p.valTxt }}<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">{{ p.okIcon }}<\u002Ftd><\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:12px\">\n            <button onclick=\"{{ applyPlan }}\" style=\"background:linear-gradient(#FF7A00,#E4002B);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-family:'Fredoka';font-size:14px;font-weight:700;cursor:pointer\">{{ applyBtnTxt }}<\u002Fbutton>\n            <button onclick=\"{{ clearPreview }}\" style=\"background:#F3E7D2;color:#5a3620;border:none;border-radius:10px;padding:11px 18px;font-family:'Fredoka';font-size:14px;font-weight:600;cursor:pointer\">Cancelar<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- current plan -->\n      <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:16px;padding:20px 22px\">\n        <div style=\"font-weight:700;font-size:16px;margin-bottom:4px\">Plan de hoy por restaurante<\u002Fdiv>\n        <div style=\"font-size:12px;color:#9a7a5c;margin-bottom:12px\">{{ hoyLong }} · así lo verá cada encargado en su registro<\u002Fdiv>\n        <sc-for list=\"{{ planRows }}\" as=\"p\" hint-placeholder-count=\"8\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #F6EEDD\">\n            <span style=\"width:8px;height:8px;border-radius:50%;background:{{ p.dot }}\"><\u002Fspan>\n            <span style=\"flex:1;font-weight:600;font-size:13px\">{{ p.name }}<\u002Fspan>\n            <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13.5px;font-weight:700\">{{ p.planTxt }} €<\u002Fspan>\n            <span style=\"font-size:10.5px;color:{{ p.srcColor }};background:{{ p.srcBg }};border-radius:12px;padding:2px 8px\">{{ p.srcTxt }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ventas reales -->\n    <div style=\"background:#FFFDF8;border:1.5px solid #EAD9BB;border-radius:16px;padding:20px 22px;margin-bottom:18px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\"><span style=\"font-size:22px\">📈<\u002Fspan><div style=\"font-weight:700;font-size:16px\">Cargar ventas reales (histórico)<\u002Fdiv><\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#6b4a30;margin-bottom:14px\">Sube tu <b>export de ventas<\u002Fb> (columnas <b>Fecha<\u002Fb>, <b>Código<\u002Fb> y <b>Venta<\u002Fb>): reparte automáticamente la venta total de cada día a su restaurante y completa el <b>acumulado real<\u002Fb>. También admite el formato ancho (código BK + fechas en columnas).<\u002Fdiv>\n      <label style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:2px dashed #D8BD96;border-radius:13px;padding:22px;cursor:pointer;background:#FFF9EE\" style-hover=\"border-color:#FF7A00;background:#FFF3DF\">\n        <span style=\"font-size:28px\">📊<\u002Fspan>\n        <span style=\"font-size:13.5px;font-weight:600;color:#5a3620\">Sube tu Excel de ventas reales<\u002Fspan>\n        <input type=\"file\" accept=\".xlsx,.xls,.csv\" onchange=\"{{ onRealFile }}\" style=\"display:none\">\n      <\u002Flabel>\n      <div style=\"font-size:11.5px;color:#9a7a5c;margin-top:10px\">Solo actualiza los días incluidos en el archivo; el resto se queda como esté. Ignora subtotales y jerarquías automáticamente. Si el Excel trae proyección, también se carga.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- historial de subidas -->\n    <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:16px;padding:20px 22px;margin-bottom:18px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\"><span style=\"font-size:20px\">🗂️<\u002Fspan><div style=\"font-weight:700;font-size:16px\">Historial de subidas<\u002Fdiv><\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#6b4a30;margin-bottom:14px\">Registro de cada carga para saber qué has subido y qué falta.<\u002Fdiv>\n      <sc-if value=\"{{ hasUploads }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;grid-template-columns:1fr auto auto auto;gap:2px 14px;font-size:11px;color:#9a7a5c;font-weight:600;padding:0 4px 8px;border-bottom:1px solid #F0E4CE\"><span>ARCHIVO<\u002Fspan><span style=\"text-align:center\">TIPO<\u002Fspan><span style=\"text-align:right\">DÍAS<\u002Fspan><span style=\"text-align:right\">SUBIDO<\u002Fspan><\u002Fdiv>\n      <div style=\"max-height:240px;overflow-y:auto\">\n        <sc-for list=\"{{ uploadRows }}\" as=\"u\" hint-placeholder-count=\"3\">\n          <div style=\"display:grid;grid-template-columns:1fr auto auto auto;gap:2px 14px;font-size:12.5px;padding:10px 4px;border-bottom:1px solid #F6EEDD;align-items:center\">\n            <div><div style=\"font-weight:600;color:#241812;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px\">{{ u.fileName }}<\u002Fdiv><div style=\"font-size:10.5px;color:#9a7a5c\">{{ u.rango }} · {{ u.restos }} restaurantes<\u002Fdiv><\u002Fdiv>\n            <span style=\"justify-self:center;font-size:11px;font-weight:700;color:{{ u.tipoColor }};background:{{ u.tipoBg }};border-radius:20px;padding:3px 10px;white-space:nowrap\">{{ u.tipoTxt }}<\u002Fspan>\n            <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:600\">{{ u.dias }}<\u002Fspan>\n            <span style=\"text-align:right;font-size:11px;color:#9a7a5c;white-space:nowrap\">{{ u.cuando }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noUploads }}\"><div style=\"text-align:center;color:#9a7a5c;font-size:13px;padding:18px;background:#FFF9EE;border-radius:12px\">Aún no has subido ningún archivo. Cuando cargues un plan o ventas reales, aparecerá aquí.<\u002Fdiv><\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:16px;padding:20px 22px;margin-top:18px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\"><span style=\"font-size:20px\">🔗<\u002Fspan><div style=\"font-weight:700;font-size:16px\">Enlaces de acceso de cada restaurante<\u002Fdiv><\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#6b4a30;margin-bottom:14px\">Reparte a cada encargado su enlace secreto: abre <b>directo a su restaurante<\u002Fb> y no ve a los demás. Guárdalo en el navegador de su PC.<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <sc-for list=\"{{ accessCards }}\" as=\"a\" hint-placeholder-count=\"8\">\n          <div style=\"display:flex;align-items:center;gap:10px;background:#FFF9EE;border:1px solid #EEDFC4;border-radius:11px;padding:10px 13px;overflow:hidden\">\n            <span style=\"width:9px;height:9px;border-radius:50%;background:{{ a.dot }};flex:none\"><\u002Fspan>\n            <span style=\"font-weight:600;font-size:13.5px;flex:none;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ a.name }}<\u002Fspan>\n            <span style=\"flex:1;min-width:0;font-size:11px;color:#c9b48f;font-family:'Spline Sans Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">enlace oculto →<\u002Fspan>\n            <span onclick=\"{{ a.copy }}\" style=\"cursor:pointer;flex:none;font-size:11px;font-weight:7   <\u002Fsc-for>\n        <div style=\"display:flex;gap:16px;margin-top:12px;font-size:11px;color:#9a7a5c\"><span>▬ real<\u002Fspan><span>┃ plan (objetivo)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showQHistory }}\">\n      <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:16px;padding:18px 20px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px\"><div style=\"font-weight:700;font-size:15px\">Quebrantos del mes<\u002Fdiv><div style=\"text-align:right\"><div style=\"font-size:10.5px;color:#9a7a5c\">acumulado<\u002Fdiv><div style=\"font-size:16px;font-weight:700;color:#c23a12;font-family:'Spline Sans Mono',monospace\">{{ qMonthTotal }} €<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr auto auto auto;gap:4px 12px;font-size:11px;color:#9a7a5c;padding:0 4px 6px;border-bottom:1px solid #F0E4CE\"><span>FECHA<\u002Fspan><span style=\"text-align:right\">DEBE<\u002Fspan><span style=\"text-align:right\">REAL<\u002Fspan><span style=\"text-align:right\">DESC.<\u002Fspan><\u002Fdiv>\n        <div style=\"max-height:270px;overflow-y:auto\">\n          <sc-for list=\"{{ qRows }}\" as=\"q\" hint-placeholder-count=\"5\">\n            <div style=\"display:grid;grid-template-columns:1fr auto auto auto;gap:4px 12px;font-size:12.5px;padding:9px 4px;border-bottom:1px solid #F6EEDD;font-family:'Spline Sans Mono',monospace\">\n              <span style=\"font-family:'Fredoka';font-weight:600;color:{{ q.fColor }}\">{{ q.f }}<\u002Fspan>\n              <span style=\"text-align:right;color:#9a7a5c\">{{ q.dTxt }}<\u002Fspan>\n              <span style=\"text-align:right\">{{ q.rTxt }}<\u002Fspan>\n              <span style=\"text-align:right;font-weight:700;color:{{ q.xColor }}\">{{ q.xTxt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showQHistory }}\">\n    <div style=\"background:#FFFDF8;border:1px solid #EAD9BB;border-radius:16px;padding:18px 20px;margin-top:18px\">\n      <div style=\"font-weight:700;font-size:15px;margin-bottom:4px\">Histórico de días · {{ selName }}<\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#6b4a30;margin-bottom:14px\">Cierres de noche enviados por el restaurante. Días sin datos salen como <b>No rellenado<\u002Fb>.<\u002Fdiv>\n      <div style=\"overflow-x:auto\">\n      <sc-for list=\"{{ histRows }}\" as=\"h\" hint-placeholder-count=\"10\">\n            <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;min-width:820px;font-size:13px\">\n        <thead><tr style=\"background:linear-gradient(#3a2417,#241812);color:#F7DFBF\">\n          <th style=\"text-align:left;padding:11px 14px;font-size:11px;font-weight:600\">DÍA<\u002Fth>\n          <th style=\"padding:11px 8px;font-size:11px;font-weight:600;color:#C9A87E\">PLAN €<\u002Fth>\n          <th style=\"padding:11px 8px;font-size:11px;font-weight:600\">REAL €<\u002Fth>\n          <th style=\"padding:11px 8px;font-size:11px;font-weight:600;color:#C9A87E\">DIF<\u002Fth>\n          <th style=\"padding:11px 8px;font-size:11px;font-weight:600\">🚗 AUTO<\u002Fth>\n          <th style=\"padding:11px 8px;font-size:11px;font-weight:600\">🍔 ORB<\u002Fth>\n          <th style=\"padding:11px 8px;font-size:11px;font-weight:600\">HORAS<\u002Fth>\n          <th style=\"padding:11px 8px;font-size:11px;font-weight:600;color:#FFC72C\">RATIO<\u002Fth>\n          <th style=\"padding:11px 8px;font-size:11px;font-weight:600\">DESCUADRE<\u002Fth>\n          <th style=\"padding:11px 14px;font-size:11px;font-weight:600\">RESEÑAS<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #F0E4CE;background:{{ h.rowBg }}\">\n              <td style=\"padding:9px 14px;font-weight:600;white-space:nowrap\">{{ h.fecha }}<\u002Ftd>\n              <td style=\"padding:9px 8px;text-align:right;color:#9a7a5c;font-family:'Spline Sans Mono',monospace\">{{ h.planTxt }}<\u002Ftd>\n              <td style=\"padding:9px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:600\">{{ h.realRO }}<\u002Ftd>\n              <td style=\"padding:9px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:600;color:{{ h.difColor }}\">{{ h.difTxt }}<\u002Ftd>\n              <td style=\"padding:9px 8px;text-align:center;font-family:'Spline Sans Mono',monospace;color:{{ h.autoColor }}\">{{ h.auto }}<\u002Ftd>\n              <td style=\"padding:9px 8px;text-align:center;font-family:'Spline Sans Mono',monospace;color:{{ h.orbColor }}\">{{ h.orb }}<\u002Ftd>\n              <td style=\"padding:9px 8px;text-align:right;font-family:'Spline Sans Mono',monospace\">{{ h.horasTxt }}<\u002Ftd>\n              <td style=\"padding:9px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:700\">{{ h.ratioTxt }}<\u002Ftd>\n              <td style=\"padding:9px 8px;text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:700;color:{{ h.descColor }}\">{{ h.descTxt }}<\u002Ftd>\n              <td style=\"padding:9px 14px;text-align:center;font-family:'Spline Sans Mono',monospace\">{{ h.resTxt }}<\u002Ftd>\n            <\u002Ftr>\n          \n        <\u002Ftbody>\n      <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  KEY='bk_control_v3'; SBKEY='bk_sb_cfg';\n  TODAY=(()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();\n  NOW=new Date();\n  NAME='Cintia'; REGION='Tenerife'; UMBRAL=10;\n  // ── Conexión Supabase: rellena estos dos y TODOS los PCs quedan conectados sin tocar nada ──\n  SB_URL='https://vrygpielsivzixogoksm.supabase.co'; SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyeWdwaWVsc2l2eml4b2dva3NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDk1OTIsImV4cCI6MjA5ODgyNTU5Mn0.SiXwc_-cUhipoEuia8xP5JokLoWZ11EQ3FM6XUtE9N8';\n  // ── Enlaces secretos por restaurante (?resto=id&k=token) ──\n  TOK={ chafiras:'m4k9x2qp', siam:'v7b3n8wz', adeje:'r2j6t5yc', paraiso:'h8d4f1sg', cristianos:'q3w9e7ru', fanabe:'z5x1c8vb', llanos:'t6y2u4io', leroy:'p9a3s7df' };\n  state = { screen:'access', sel:0, turno:'noche', yoTab:'hoy', restoTab:'registro',\n    periodo:(new Date()).getFullYear()+'-'+String((new Date()).getMonth()+1).padStart(2,'0'), consMetric:'real',\n    subs:{}, plan:{}, qlog:{}, hist:{}, work:{}, qForm:{deb:'',real:''}, uploads:[], acumMes:(new Date()).getFullYear()+'-'+String((new Date()).getMonth()+1).padStart(2,'0'),\n    planPreview:null, planInfo:'', planInfoOk:true, regSaved:false, regMissing:[], regWarnKey:null, locked:false, copied:'', realResto:'chafiras',\n    qModal:null, seenComments:{},\n    sbUrl:'', sbKey:'', sbReady:false, sbMsg:'' };\n\n  R = [\n    { id:'chafiras', name:'Chafiras', dot:'#E4002B' },\n    { id:'siam', name:'Siam Mall', dot:'#2E7DD1' },\n    { id:'adeje', name:'Adeje', dot:'#3f8f2a' },\n    { id:'paraiso', name:'Playa Paraíso', dot:'#C44FC4' },\n    { id:'cristianos', name:'Los Cristianos', dot:'#FF7A00' },\n    { id:'fanabe', name:'Playa Fañabé', dot:'#E4002B' },\n    { id:'llanos', name:'Los Llanos de Aridane', dot:'#7A5230' },\n    { id:'leroy', name:'Leroy Adeje', dot:'#2E7DD1' },\n  ];\n  OBJ=210; // objetivo de tiempos en segundos (3:30)\n\n  GREEN='#3f8f2a'; RED='#c23a12'; INK='#241812'; MUTE='#9a7a5c'; AMBER='#E8A21A'; ACT='#FFC72C'; ACTX='#241812'; INX='#C9A87E'; TR='transparent';\n\n  // ---------- lifecycle / persistence ----------\n  componentDidMount(){\n    this._scope=null;\n    try{ if(this.NOW.getHours() < 17) this.setState({turno:'medio'}); }catch(e){}\n    try{ const q=new URLSearchParams(location.search); const rid=(q.get('resto')||'').toLowerCase().trim();\n      const rIdx=this.R.findIndex(r=>r.id===rid);\n      if(rid){ if(rIdx>=0 && q.get('k')===this.TOK[rid]){ this._scope=rid; this.setState({screen:'store', sel:rIdx, restoTab:'registro', locked:true}); } else { this.setState({screen:'denied', locked:true}); } }\n      else if(q.get('oficina')||q.get('panel')){ this.setState({screen:'office', yoTab:'hoy'}); }\n      else { this.setState({screen:'office', yoTab:'hoy'}); }\n    }catch(e){}\n    const d=this.load();\n    if(d && d.subs){ this.setState({subs:d.subs, plan:d.plan||{}, qlog:d.qlog||{}, hist:d.hist||{}, uploads:d.uploads||[]}); }\n    if(this.SB_URL){ this.setState({sbReady:true}, ()=>{ if(this.initSb()){ this.cloudPull(this._scope); if(!this._scope) this.subscribeSb(); } }); }\n    else { try{ const cfg=JSON.parse(localStorage.getItem(this.SBKEY)||'null'); if(cfg&&cfg.url){ this.setState({sbUrl:cfg.url, sbKey:cfg.key||'', sbReady:true}, ()=>{ if(this.initSb()){ this.cloudPull(this._scope); if(!this._scope) this.subscribeSb(); } }); } }catch(e){} }\n    this._onStorage=(e)=>{ if(e.key===this.KEY){ const n=this.load(); if(n) this.setState({subs:n.subs||{}, plan:n.plan||{}, qlog:n.qlog||{}, hist:n.hist||{}}); } };\n    window.addEventListener('storage', this._onStorage);\n  }\n  componentWillUnmount(){ if(this._onStorage) window.removeEventListener('storage', this._onStorage); if(this._sub){ try{ this._sub.unsubscribe(); }catch(e){} } }\n  load(){ try{ return JSON.parse(localStorage.getItem(this.KEY)||'null'); }catch(e){ return null; } }\n  persist(){ try{ localStorage.setItem(this.KEY, JSON.stringify({subs:this.state.subs, plan:this.state.plan, qlog:this.state.qlog, hist:this.state.hist, uploads:this.state.uploads})); }catch(e){} }\n  commit(patch){ this.setState(patch, ()=>this.persist()); }\n  monthPrefix(){ return this.TODAY.slice(0,7); }\n  yearPrefix(){ return this.TODAY.slice(0,4); }\n  inPeriod(f, period){ if(typeof f!=='string') return false; if(period==='anio') return f.startsWith(this.yearPrefix()); if(period==='mes') return f.startsWith(this.monthPrefix()); return f.startsWith(period); /* period = 'YYYY-MM' */ }\n  // Agrega SOLO los cierres de NOCHE (el mediodía es punto de control, no se suma)\n  agg(id, period){\n    const S=this.state; let real=0,proy=0,hR=0,hP=0,res=0,n=0,aS=0,aN=0,oS=0,oN=0;\n    Object.keys(S.subs).forEach(k=>{ const p=k.split('|'); if(p[0]!==id||p[2]!=='noche') return; if(!this.inPeriod(p[1],period)) return;\n      const s=S.subs[k]; real+=s.real||0; proy+=s.proy||0; hR+=s.horas||0; hP+=s.horasProy||0; res+=s.res||0; n++;\n      const a=this.pt(s.auto); if(!isNaN(a)){aS+=a;aN++;} const o=this.pt(s.orb); if(!isNaN(o)){oS+=o;oN++;} });\n    let plan=0; Object.keys(S.plan).forEach(k=>{ const p=k.split('|'); if(p[0]!==id||p[1]==='default') return; if(!this.inPeriod(p[1],period)) return; plan+=S.plan[k]; });\n    return { real, proy, plan, hR, hP, res, n, ratio:hR>0?real/hR:0, auto:aN?aS/aN:null, orb:oN?oS/oN:null };\n  }\n  qAgg(id, period){ let t=0; (this.state.qlog[id]||[]).forEach(q=>{ if(this.inPeriod(q.iso,period)) t+=q.x; }); return t; }\n  fmtTime(sec){ if(sec==null||isNaN(sec)) return '—'; const m=Math.floor(sec/60), s=Math.round(sec%60); return m+':'+String(s).padStart(2,'0'); }\n  isoDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n  labelDate(iso){ try{ const d=new Date(iso+'T00:00:00'); const dow=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()]; const mo=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()]; return dow+' '+d.getDate()+' '+mo; }catch(e){ return iso; } }\n  histDays(n){ const out=[]; const base=new Date(this.TODAY+'T00:00:00'); for(let i=0;i<n;i++){ const d=new Date(base); d.setDate(d.getDate()-i); out.push(this.isoDate(d)); } return out; }\n  longDate(iso){ try{ const d=new Date(iso+'T00:00:00'); const dow=['dom','lun','mar','mié','jue','vie','sáb'][d.getDay()]; const mo=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()]; return dow+' '+d.getDate()+' '+mo+' '+d.getFullYear(); }catch(e){ return iso; } }\n  fullDate(iso){ try{ const d=new Date(iso+'T00:00:00'); const dow=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][d.getDay()]; const mo=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][d.getMonth()]; return dow+' '+d.getDate()+' de '+mo; }catch(e){ return iso; } }\n  hourTxt(){ try{ return String(this.NOW.getHours()).padStart(2,'0')+':'+String(this.NOW.getMinutes()).padStart(2,'0'); }catch(e){ return ''; } }\n  ratioPts(sub){ if(!sub) return null; const rr=(sub.horas>0)?(sub.real||0)/sub.horas:null; const rp=(sub.horasProy>0)?(sub.proy||0)/sub.horasProy:null; if(rr==null||rp==null) return null; return rr-rp; }\n\n  // ---------- helpers ----------\n  num(v){ if(v==null||v==='') return null; const s=String(v).replace(/\\s/g,'').replace(/\\./g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?null:n; }\n  pt(t){ if(t==null||t==='') return NaN; t=String(t).trim(); if(t.includes(':')){ const p=t.split(':'); return (+p[0])*60+(+p[1]); } const n=parseFloat(t); return isNaN(n)?NaN:n; }\n  f0(n){ return new Intl.NumberFormat('es-ES').format(Math.round(n)); }\n  signed(n){ return (n>0?'+':n<0?'−':'')+this.f0(Math.abs(n)); }\n  rat(n){ return n.toFixed(1).replace('.',','); }\n  norm(s){ return String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9]/g,''); }\n  tCol(t){ return this.pt(t)<=210?this.GREEN:this.RED; }\n  planFor(r){ const p=this.state.plan; if(p[`${r.id}|${this.TODAY}`]!=null) return p[`${r.id}|${this.TODAY}`]; if(p[`${r.id}|default`]!=null) return p[`${r.id}|default`]; return null; }\n  planForDay(id, iso){ const p=this.state.plan; if(p[`${id}|${iso}`]!=null) return p[`${id}|${iso}`]; if(p[`${id}|default`]!=null) return p[`${id}|default`]; return null; }\n  planSrc(
